services:
  database:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-structlab}
      POSTGRES_USER: ${POSTGRES_USER:-structlab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-structlab_local_password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      DB_URL: jdbc:postgresql://database:5432/${POSTGRES_DB:-structlab}
      DB_USERNAME: ${POSTGRES_USER:-structlab}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-structlab_local_password}
      DB_DRIVER: org.postgresql.Driver
      JWT_SECRET: ${JWT_SECRET:-structlab-docker-local-secret-change-before-production-2026}
      JWT_TTL_HOURS: ${JWT_TTL_HOURS:-24}
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"
    depends_on:
      database:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080/api
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres-data:
